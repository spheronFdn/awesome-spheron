version: "1.0"

services:
  sn9-pretraining:
    image: spheronnetwork/sn9-pretraining:v1.0.6
    expose:
      - port: 8080
        as: 8080
        to:
          - global: true
    env:
      - HF_ACCESS_TOKEN=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
      - HF_REPO_ID=rekpero/sn9-pretraining
      - AVG_LOSS_UPLOAD_THRESHOLD=0.01
      - COLDKEY_MNEMONIC=club senior spray wagon indicate sunny carpet reduce wealth need huge oil
      - HOTKEY_MNEMONIC=brisk child group reward huge permit solar found bag annual great smile

profiles:
  name: sn9-pretraining
  duration: 2h
  mode: provider
  tier:
    - community
  compute:
    sn9-pretraining:
      resources:
        cpu:
          units: 8
        memory:
          size: 16Gi
        storage:
          - size: 200Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: h100
  placement:
    westcoast:
      attributes:
        region: us-west
      pricing:
        sn9-pretraining:
          token: USDT
          amount: 10

deployment:
  sn9-pretraining:
    westcoast:
      profile: sn9-pretraining
      count: 1
