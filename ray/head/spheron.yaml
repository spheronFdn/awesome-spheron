version: "1.0"

services:
  ray-head:
    image: spheronnetwork/ray-head-node:v1
    pull_policy: IfNotPresent
    expose:
      - port: 3000
        as: 3000
        to:
          - global: true
      - port: 8080
        as: 8080
        to:
          - global: true
      - port: 8888
        as: 8888
        to:
          - global: true
      - port: 6379
        as: 6379
        use_public_port: true
        to:
          - global: true
      - port: 8265
        as: 8265
        use_public_port: true
        to:
          - global: true
      - port: 10001
        as: 10001
        use_public_port: true
        to:
          - global: true
