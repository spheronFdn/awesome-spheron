      - port: 8020
        as: 8020
        use_public_port: true
        to:
          - global: true
    env:
      - RAY_health_check_timeout_ms=20000
profiles:
  name: ray-head-testing
  duration: 1h
  mode: fizz
  tier:
    - community
  compute:
    ray-head:
      resources:
        cpu:
          units: 8
        memory:
          size: 16Gi
        storage:
          - size: 100Gi
  placement:
    westcoast:
      pricing:
        ray-head:
          token: USDT
          amount: 1

deployment:
  ray-head:
    westcoast:
      profile: ray-head
      count: 1
